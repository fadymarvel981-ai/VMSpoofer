name: Professional VMSpoofer Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive # ده مهم عشان لو فيه كود خارجي

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build Solution
      run: |
        # البحث عن ملف الـ .sln وبناؤه تلقائياً
        $slnPath = Get-ChildItem -Recurse -Filter *.sln | Select-Object -First 1
        msbuild $slnPath.FullName /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143

    - name: Upload VMSpoofer
      uses: actions/upload-artifact@v4
      with:
        name: VMSpoofer-Package
        path: |
          **/Release/*.exe
          **/Release/*.dll
